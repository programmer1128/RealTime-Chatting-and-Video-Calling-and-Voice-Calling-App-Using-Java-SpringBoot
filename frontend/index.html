<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Defence Comm Platform - Voice Call</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="app.css" rel="stylesheet" />
</head>
<body class="bg-dark text-light">

<div class="container py-4">

    <h1 class="text-center mb-4">Defence Communication Platform</h1>

    <div id="main-options" class="text-center">
        <button id="registerBtn" class="btn btn-primary mx-2">Register</button>
        <button id="proceedBtn" class="btn btn-success mx-2">Proceed</button>
    </div>

    <hr class="my-4 bg-light" />

    <!-- Register Section -->
    <div id="registerSection" class="d-none">
        <h3>Add User</h3>
        <form id="addUserForm" class="mb-3">
            <div class="mb-2">
                <input type="text" id="userName" class="form-control" placeholder="Name" required autofocus />
            </div>
            <div class="mb-2">
                <input type="text" id="userPhone" class="form-control" placeholder="Phone Number" required />
            </div>
            <button type="submit" class="btn btn-primary">Add User</button>
            <button type="button" id="backFromRegister" class="btn btn-secondary ms-2">Back</button>
        </form>

        <h4>Registered Users</h4>
        <ul id="userList" class="list-group mb-4"></ul>

        <button id="createGroupBtn" class="btn btn-warning">Create Group</button>
    </div>

    <!-- Create Group Section -->
    <div id="createGroupSection" class="d-none">
        <h3>Create Group</h3>
        <form id="createGroupForm" class="mb-3">
            <div class="mb-2">
                <input type="text" id="groupName" class="form-control" placeholder="Group Name" required autofocus />
            </div>
            <div>
                <label>Select Members:</label>
                <select id="groupMembers" multiple size="5" class="form-select"></select>
            </div>
            <button type="submit" class="btn btn-warning mt-2">Create Group</button>
            <button type="button" id="backFromGroup" class="btn btn-secondary ms-2 mt-2">Back</button>
        </form>
        <h4>Existing Groups</h4>
        <ul id="groupList" class="list-group"></ul>
    </div>

    <!-- Proceed Section -->
    <div id="proceedSection" class="d-none">
        <h3>Voice Call</h3>

        <div>
            <button id="backFromProceed" class="btn btn-secondary mb-3">Back</button>
        </div>

        <div>
            <label>Select User to Call:</label>
            <select id="callUserSelect" class="form-select mb-3"></select>
            <button id="callUserBtn" class="btn btn-primary mb-3">Call User</button>
        </div>

        <div>
            <label>Select Group to Call:</label>
            <select id="callGroupSelect" class="form-select mb-3"></select>
            <button id="callGroupBtn" class="btn btn-success mb-3">Call Group</button>
        </div>

        <div id="callStatus" class="mt-3"></div>

        <audio id="remoteAudio" autoplay></audio>
    </div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</body>
</html>
